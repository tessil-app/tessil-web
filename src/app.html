<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JTransfer - End-to-end encrypted file transfer</title>
    <meta
      name="description"
      content="JTransfer sends files with end-to-end encryption in your browser. We never see your files or encryption keys."
    />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#111827" />
    <meta name="referrer" content="no-referrer" />
    <meta property="og:site_name" content="JTransfer" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="JTransfer - End-to-end encrypted file transfer" />
    <meta
      property="og:description"
      content="JTransfer sends files with end-to-end encryption in your browser. We never see your files or encryption keys."
    />
    <meta property="og:url" content="https://jtransfer.jimmyverburgt.com/" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="JTransfer - End-to-end encrypted file transfer" />
    <meta
      name="twitter:description"
      content="JTransfer sends files with end-to-end encryption in your browser. We never see your files or encryption keys."
    />
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval';
        style-src 'self' 'unsafe-inline';
        img-src 'self' data: blob: https:;
        font-src 'self' data:;
        connect-src 'self' https: http://localhost:3000;
        worker-src 'self' blob:;
        frame-src 'none';
        object-src 'none';
        base-uri 'self';
        form-action 'self';
      "
    />
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <script>
      (() => {
        const siteUrl = "https://jtransfer.jimmyverburgt.com";
        const path = window.location.pathname === "/"
          ? "/"
          : window.location.pathname.replace(/\/+$/, "");
        const isTransferRoute = path.startsWith("/d/");

        const pageMeta = {
          "/": {
            title: "JTransfer - End-to-end encrypted file transfer",
            description:
              "JTransfer sends files with end-to-end encryption in your browser. We never see your files or encryption keys.",
          },
          "/privacy": {
            title: "Privacy Policy - JTransfer",
            description:
              "Read how JTransfer handles data, encryption, retention, and GDPR rights for end-to-end encrypted file transfer.",
          },
          "/terms": {
            title: "Terms of Service - JTransfer",
            description:
              "Review JTransfer terms of service, usage limits, legal compliance, and acceptable use for end-to-end encrypted file transfer.",
          },
          "/abuse": {
            title: "Report Abuse - JTransfer",
            description:
              "Report illegal or abusive content on JTransfer quickly. Submit transfer links for review and action.",
          },
          "/security": {
            title: "Security Overview - JTransfer",
            description:
              "Security overview for JTransfer end-to-end encrypted file transfer, including threat boundaries and disclosure process.",
          },
          "/pricing": {
            title: "Pricing — JTransfer",
            description:
              "JTransfer is built and run by one person. Pro keeps the project alive — and gives you more headroom on every limit.",
          },
        };

        const fallback = pageMeta["/"];
        const current = pageMeta[path] ?? fallback;
        document.title = current.title;

        const setMeta = (attrName, attrValue, value) => {
          let tag = document.head.querySelector(
            `meta[${attrName}="${attrValue}"]`
          );
          if (!tag) {
            tag = document.createElement("meta");
            tag.setAttribute(attrName, attrValue);
            document.head.appendChild(tag);
          }
          tag.setAttribute("content", value);
        };

        setMeta("name", "description", current.description);
        setMeta("property", "og:title", current.title);
        setMeta("property", "og:description", current.description);
        setMeta("name", "twitter:title", current.title);
        setMeta("name", "twitter:description", current.description);

        const canonicalPath = path === "/" ? "/" : path;
        const canonicalUrl = `${siteUrl}${canonicalPath}`;
        setMeta("property", "og:url", canonicalUrl);

        let canonicalTag = document.head.querySelector('link[rel="canonical"]');
        if (!canonicalTag) {
          canonicalTag = document.createElement("link");
          canonicalTag.setAttribute("rel", "canonical");
          document.head.appendChild(canonicalTag);
        }
        canonicalTag.setAttribute("href", canonicalUrl);

        let robots = "index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1";
        if (isTransferRoute) {
          robots = "noindex, nofollow, noarchive, nosnippet";
        }
        setMeta("name", "robots", robots);
      })();
    </script>
    %sveltekit.head%
  </head>
  <body
    data-sveltekit-preload-data="tap"
    class="bg-background text-foreground"
  >
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
