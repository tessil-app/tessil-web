<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tessil — Send anything. We see nothing.</title>
    <meta
      name="description"
      content="End-to-end encrypted file transfer. Your browser encrypts before upload — we never see your files or the key."
    />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#fafaf7" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0e0f12" />
    <meta name="referrer" content="no-referrer" />
    <link rel="preload" as="font" type="font/woff2" href="/fonts/Switzer-Variable.woff2" crossorigin />
    <meta property="og:site_name" content="Tessil" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Tessil — Send anything. We see nothing." />
    <meta
      property="og:description"
      content="End-to-end encrypted file transfer. Your browser encrypts before upload — we never see your files or the key."
    />
    <meta property="og:image" content="https://tessil.app/og-image.png" />
    <meta property="og:url" content="https://tessil.app/" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Tessil — Send anything. We see nothing." />
    <meta
      name="twitter:description"
      content="End-to-end encrypted file transfer. Your browser encrypts before upload — we never see your files or the key."
    />
    <meta name="twitter:image" content="https://tessil.app/og-image.png" />
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval';
        style-src 'self' 'unsafe-inline';
        img-src 'self' data: blob: https:;
        font-src 'self' data:;
        connect-src 'self' https: http://localhost:3000;
        worker-src 'self' blob:;
        frame-src 'none';
        object-src 'none';
        base-uri 'self';
        form-action 'self';
      "
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <script>
      (() => {
        const siteUrl = "https://tessil.app";
        const path = window.location.pathname === "/"
          ? "/"
          : window.location.pathname.replace(/\/+$/, "");
        const isTransferRoute = path.startsWith("/d/");

        const pageMeta = {
          "/": {
            title: "Tessil — Send anything. We see nothing.",
            description:
              "End-to-end encrypted file transfer. Your browser encrypts before upload — we never see your files or the key.",
          },
          "/privacy": {
            title: "Privacy Policy — Tessil",
            description:
              "What data Tessil handles, how long, and your GDPR rights. End-to-end encrypted file transfer.",
          },
          "/terms": {
            title: "Terms of Service — Tessil",
            description:
              "Tessil terms of service: usage, limits, acceptable use, legal compliance. End-to-end encrypted file transfer.",
          },
          "/abuse": {
            title: "Report Abuse — Tessil",
            description:
              "Report illegal or abusive transfers on Tessil. Submit a link for review.",
          },
          "/security": {
            title: "Security Overview — Tessil",
            description:
              "How Tessil's encryption works, what we can and cannot see, and how to report vulnerabilities.",
          },
          "/pricing": {
            title: "Pricing — Tessil",
            description:
              "Tessil pricing — Free for routine encrypted file transfer, Pro for higher limits. Built and run by one person.",
          },
        };

        const fallback = pageMeta["/"];
        const current = pageMeta[path] ?? fallback;
        document.title = current.title;

        const setMeta = (attrName, attrValue, value) => {
          let tag = document.head.querySelector(
            `meta[${attrName}="${attrValue}"]`
          );
          if (!tag) {
            tag = document.createElement("meta");
            tag.setAttribute(attrName, attrValue);
            document.head.appendChild(tag);
          }
          tag.setAttribute("content", value);
        };

        setMeta("name", "description", current.description);
        setMeta("property", "og:title", current.title);
        setMeta("property", "og:description", current.description);
        setMeta("name", "twitter:title", current.title);
        setMeta("name", "twitter:description", current.description);

        const canonicalPath = path === "/" ? "/" : path;
        const canonicalUrl = `${siteUrl}${canonicalPath}`;
        setMeta("property", "og:url", canonicalUrl);

        let canonicalTag = document.head.querySelector('link[rel="canonical"]');
        if (!canonicalTag) {
          canonicalTag = document.createElement("link");
          canonicalTag.setAttribute("rel", "canonical");
          document.head.appendChild(canonicalTag);
        }
        canonicalTag.setAttribute("href", canonicalUrl);

        let robots = "index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1";
        if (isTransferRoute) {
          robots = "noindex, nofollow, noarchive, nosnippet";
        }
        setMeta("name", "robots", robots);
      })();
    </script>
    %sveltekit.head%
  </head>
  <body
    data-sveltekit-preload-data="tap"
    class="bg-background text-foreground"
  >
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
